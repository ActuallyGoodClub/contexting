name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-python:
    name: Python — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: build
          args: --release --strip
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.os }}
          path: target/wheels/*.whl

  build-js:
    name: JS / WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build
        working-directory: bindings/js
        run: wasm-pack build --release --target bundler --out-dir pkg

      - name: Pack
        working-directory: bindings/js/pkg
        run: npm pack

      - uses: actions/upload-artifact@v4
        with:
          name: js-wasm
          path: bindings/js/pkg/*.tgz

  release:
    name: Create Release
    needs: [build-python, build-js]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect wheels
        run: mkdir dist && find artifacts -name "*.whl" -exec cp {} dist/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.whl
            artifacts/**/*.tgz
